<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIASGTWF Association</title>
    <style>
        :root { --p: #1a237e; --s: #28a745; --d: #dc3545; --accent: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; text-align: center; }
        .box { background: white; max-width: 450px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); }
        input, textarea, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 15px; }
        .btn { width: 100%; padding: 15px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 8px; text-decoration: none; display: block; }
        .btn-p { background: var(--p); } .btn-s { background: var(--s); } .btn-d { background: var(--d); } .btn-b { background: #6c757d; }
        .hidden { display: none; }
        .card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; border-left: 4px solid var(--p); position: relative; font-size: 14px; }
        .solved-card { border-left: 4px solid var(--s); background: #e8f5e9; }
        .notif-badge { background: #fff9c4; color: #333; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #fbc02d; text-align: left; }
        .logo-main { width: 110px; height: auto; margin-bottom: 10px; }
        /* SOS ബട്ടൺ സ്റ്റൈൽ */
        .sos-float { background: red; color: white; border-radius: 50%; width: 65px; height: 65px; position: fixed; bottom: 20px; right: 20px; font-weight: bold; border: none; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); font-size: 12px; }
    </style>
</head>
<body>

<button class="sos-float" onclick="makeCall('112')">SOS<br>112</button>

<div class="box" id="homePage">
    <img src="logo.png" alt="Logo" class="logo-main" onerror="this.src='https://via.placeholder.com/120?text=AIASG'">
    <h3 style="color: var(--p); margin: 0;">AIASGTWF ASSOCIATION</h3>
    <p style="font-weight: bold; color: var(--accent); margin: 5px 0;">"UNITY IS STRENGTH"</p>
    <hr>
    <button class="btn btn-p" onclick="show('memberLogin')">Member Login</button>
    <button class="btn btn-s" onclick="show('regForm')">Join Association (₹200)</button>
    <button class="btn btn-b" onclick="show('adminLogin')">Creator Console</button>
</div>

<div class="box hidden" id="regForm">
    <h3>New Membership</h3>
    <input type="text" id="reg_name" placeholder="പേര്">
    <input type="text" id="reg_place" placeholder="സ്ഥലം">
    <input type="number" id="reg_mobile" placeholder="മൊബൈൽ നമ്പർ">
    <input type="text" id="reg_agency" placeholder="ഏജൻസിയുടെ പേര്">
    <input type="number" id="reg_salary" placeholder="ലഭിക്കുന്ന സാലറി">
    <select id="reg_esipf">
        <option value="">ESI / PF ഉണ്ടോ?</option>
        <option value="Yes">ഉണ്ട് (Yes)</option>
        <option value="No">ഇല്ല (No)</option>
    </select>
    <button class="btn btn-s" onclick="processPayment()">Pay ₹200 & Join</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<div class="box hidden" id="memberDash">
    <h3 id="welcomeMsg" style="color: var(--s);">Welcome</h3>
    <div id="memberNotif" class="hidden"></div>
    
    <div class="card">
        <h4>അടിയന്തര സാഹചര്യം</h4>
        <button class="btn btn-d" onclick="makeCall('9446841656')">അസോസിയേഷനെ അറിയിക്കുക</button>
    </div>

    <div class="card">
        <h4>പരാതി സമർപ്പിക്കാൻ</h4>
        <textarea id="comp_text" placeholder="പരാതി ഇവിടെ എഴുതുക..." rows="3"></textarea>
        <button class="btn btn-p" onclick="submitComp()">Submit Complaint</button>
    </div>
    <button class="btn btn-b" onclick="show('homePage')">Logout</button>
</div>

<div class="box hidden" id="adminLogin">
    <h3>Creator Login</h3>
    <input type="password" id="admin_pass" placeholder="Password (0000)">
    <button class="btn btn-p" onclick="adminAuth()">Login</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<div class="box hidden" id="adminDash">
    <h3 style="color: var(--p);">Admin Dashboard</h3>
    <div id="admin_content" style="text-align: left;"></div>
    <hr>
    <h4 style="color: var(--s);">Solved Complaints (History)</h4>
    <div id="solved_content" style="text-align: left;"></div>
    <button class="btn btn-b" onclick="show('homePage')">Logout</button>
</div>

<div class="box hidden" id="memberLogin">
    <h3>Member Login</h3>
    <input type="number" id="mem_mobile_login" placeholder="രജിസ്റ്റർ ചെയ്ത മൊബൈൽ നമ്പർ">
    <button class="btn btn-p" onclick="loginMember()">Login</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<script>
    // ഡാറ്റാബേസ് സെറ്റപ്പ്
    let db = JSON.parse(localStorage.getItem('AIASG_FINAL_DB')) || {
        pending_approvals: [],
        members: [{ name: 'Bharath', mobile: '9446841656', agency: 'Safeguard' }], // ഡെമോ മെമ്പർ
        comps: [],
        solved_comps: [],
        notifications: {}
    };
    let curUser = null;

    function show(id) { 
        document.querySelectorAll('.box').forEach(b => b.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    }

    function save() { localStorage.setItem('AIASG_FINAL_DB', JSON.stringify(db)); }

    // ഫോൺ വിളിക്കാനുള്ള ഫങ്ക്ഷൻ
    function makeCall(num) { window.open('tel:' + num, '_system'); }

    // രജിസ്ട്രേഷനും GPay പേയ്‌മെന്റും
    function processPayment() {
        let data = {
            name: document.getElementById('reg_name').value,
            place: document.getElementById('reg_place').value,
            mobile: document.getElementById('reg_mobile').value,
            agency: document.getElementById('reg_agency').value,
            salary: document.getElementById('reg_salary').value,
            esipf: document.getElementById('reg_esipf').value,
            date: new Date().toLocaleDateString()
        };

        if(data.name && data.mobile && data.agency) {
            db.pending_approvals.push(data);
            save();
            // GPay ലിങ്ക്
            window.location.href = `upi://pay?pa=bharath199389@oksbi&pn=Bharath&am=200&cu=INR&tn=AIASG_New_Join`;
            alert("വിവരങ്ങൾ രേഖപ്പെടുത്തി. GPay പൂർത്തിയാക്കുക.");
            show('homePage');
        } else alert("ദയവായി എല്ലാ വിവരങ്ങളും പൂരിപ്പിക്കുക.");
    }

    function loginMember() {
        let mob = document.getElementById('mem_mobile_login').value;
        let user = db.members.find(m => m.mobile === mob);
        if(user) {
            curUser = user;
            document.getElementById('welcomeMsg').innerText = "Welcome " + user.name;
            checkNotifications(mob);
            show('memberDash');
        } else alert("അംഗീകാരം ലഭിച്ചിട്ടില്ല അല്ലെങ്കിൽ തെറ്റായ നമ്പർ.");
    }

    function checkNotifications(mob) {
        let nDiv = document.getElementById('memberNotif');
        if(db.notifications[mob]) {
            nDiv.innerHTML = `<div class="notif-badge">🔔 അഡ്മിൻ മറുപടി: <br><b>${db.notifications[mob]}</b> <br>
            <button onclick="clearNotif('${mob}')" style="margin-top:8px; cursor:pointer; padding:5px;">OK</button></div>`;
            nDiv.classList.remove('hidden');
        } else nDiv.classList.add('hidden');
    }

    function clearNotif(mob) { delete db.notifications[mob]; save(); document.getElementById('memberNotif').classList.add('hidden'); }

    function submitComp() {
        db.comps.push({ mob: curUser.mobile, name: curUser.name, msg: document.getElementById('comp_text').value, date: new Date().toLocaleDateString() });
        save();
        alert("നിങ്ങളുടെ പരാതി ലഭിച്ചിട്ടുണ്ട്. ഞങ്ങളുടെ പ്രതിനിധി ഉടനെ താങ്കളെ കോണ്ടാക്റ്റ് ചെയ്യുന്നതായിരിക്കും.");
        show('homePage');
    }

    function adminAuth() {
        if(document.getElementById('admin_pass').value === "0000") { renderAdmin(); show('adminDash'); }
        else alert("Wrong Password!");
    }

    function renderAdmin() {
        let h = "<b>പുതിയ അപേക്ഷകൾ:</b>";
        db.pending_approvals.forEach((u, i) => {
            h += `<div class='card'>${u.name} (${u.place}) - ${u.agency}<br>Mob: ${u.mobile}<br>
            <button class='btn-s' style='padding:5px; width:auto;' onclick='approve(${i})'>Approve Member</button></div>`;
        });

        let c = "<b>പരാതികൾ:</b>";
        db.comps.forEach((comp, i) => {
            c += `<div class='card'><b>${comp.name}:</b> ${comp.msg}
                <textarea id="reply_${i}" placeholder="മറുപടി ടൈപ്പ് ചെയ്യുക..."></textarea>
                <button class="btn-s" style="padding:5px; width:auto;" onclick="solveAndMove(${i})">Solve & Notify</button>
            </div>`;
        });
        document.getElementById('admin_content').innerHTML = h + "<br>" + c;

        let s = "";
        db.solved_comps.forEach((sc) => {
            s += `<div class='card solved-card'><b>${sc.name}:</b> ${sc.msg}<br><span style='color:green;'>Ans: ${sc.reply}</span></div>`;
        });
        document.getElementById('solved_content').innerHTML = s || "ചരിത്രം ലഭ്യമല്ല.";
    }

    function approve(i) {
        let user = db.pending_approvals.splice(i, 1)[0];
        db.members.push(user);
        save(); renderAdmin();
    }

    function solveAndMove(i) {
        let replyText = document.getElementById(`reply_${i}`).value || "പരിഹരിച്ചു.";
        let comp = db.comps[i];
        db.solved_comps.push({ ...comp, reply: replyText });
        db.notifications[comp.mob] = replyText;
        db.comps.splice(i, 1);
        save(); renderAdmin();
        alert("മെമ്പർക്ക് നോട്ടിഫിക്കേഷൻ അയച്ചു.");
    }
</script>
</body>
  </html>
