<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIASGTWF Association</title>
    <style>
        :root { --p: #1a237e; --s: #28a745; --d: #dc3545; --accent: #ffd700; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; text-align: center; }
        .box { background: white; max-width: 450px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); }
        input, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; text-decoration: none; display: block; }
        .btn-p { background: var(--p); } .btn-s { background: var(--s); } .btn-d { background: var(--d); } .btn-b { background: #6c757d; }
        .btn-sm { padding: 8px; font-size: 12px; width: auto; display: inline-block; margin-right: 5px; margin-top: 5px; }
        .hidden { display: none; }
        .card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; border-left: 4px solid var(--p); position: relative; }
        .logo-main { width: 120px; height: auto; margin-bottom: 10px; }
        .sos-float { background: red; color: white; border-radius: 50%; width: 65px; height: 65px; position: fixed; bottom: 20px; right: 20px; font-weight: bold; border: none; cursor: pointer; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    </style>
</head>
<body>

<button class="sos-float" onclick="makeCall('112')">SOS<br>112</button>

<div class="box" id="homePage">
    <img src="logo.png" alt="Logo" class="logo-main" onerror="this.src='https://via.placeholder.com/120?text=AIASG'">
    <h3 style="color: var(--p); margin: 0;">AIASGTWF ASSOCIATION</h3>
    <p style="font-weight: bold; color: var(--accent);">"UNITY IS STRENGTH"</p>
    <hr>
    <button class="btn btn-p" onclick="show('memberLogin')">Member Login</button>
    <button class="btn btn-s" onclick="show('visitorForm')">Visitors Entry</button>
    <button class="btn btn-b" onclick="show('adminLogin')">Creator / Admin</button>
</div>

<div class="box hidden" id="payPage">
    <h3>Membership Fees: ₹200</h3>
    <img src="qr.png" style="width:180px;" onerror="this.src='https://via.placeholder.com/180?text=Scan+QR'">
    <a href="upi://pay?pa=bharath199389@oksbi&pn=Bharath&am=200&cu=INR" class="btn btn-p" style="background: #4285F4;">Pay with GPay</a>
    <hr>
    <input type="file" accept="image/*">
    <button class="btn btn-s" onclick="alert('നിങ്ങളുടെ അപേക്ഷ ലഭിച്ചു. പരിശോധനയ്ക്ക് ശേഷം ഐഡി ജനറേറ്റ് ചെയ്യുന്നതാണ്.'); show('homePage');">Submit Screenshot</button>
    <button class="btn btn-b" onclick="show('visitorDash')">Back</button>
</div>

<div class="box hidden" id="memberDash">
    <h3 id="welcomeMsg" style="color: var(--s);">Welcome</h3>
    <div class="card">
        <h4>അടിയന്തര സാഹചര്യം</h4>
        <button class="btn btn-d" onclick="makeCall('9446841656')">അസോസിയേഷനെ അറിയിക്കുക</button>
    </div>
    <div class="card">
        <h4>പരാതി സമർപ്പിക്കാൻ</h4>
        <textarea id="comp_text" placeholder="പരാതി ഇവിടെ എഴുതുക..." rows="4"></textarea>
        <button class="btn btn-p" onclick="submitComp()">Submit Complaint</button>
    </div>
    <button class="btn btn-b" onclick="show('homePage')">Logout</button>
</div>

<div class="box hidden" id="adminLogin">
    <h3>Creator Console</h3>
    <input type="password" id="admin_pass" placeholder="Password (0000)">
    <button class="btn btn-p" onclick="adminAuth()">Login</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<div class="box hidden" id="adminDash">
    <h3>Admin Dashboard</h3>
    <div class="card" style="background: #eef;">
        <h4>Add Member</h4>
        <input type="text" id="new_name" placeholder="പേര്">
        <input type="number" id="new_id" placeholder="ID (002)">
        <input type="number" id="new_mobile" placeholder="മൊബൈൽ">
        <button class="btn btn-s" onclick="addMember()">Add</button>
    </div>
    <hr>
    <div id="admin_content" style="text-align: left;"></div>
    <button class="btn btn-b" onclick="show('homePage')">Logout</button>
</div>

<div class="box hidden" id="memberLogin">
    <h3>Member Login</h3>
    <div style="display: flex; gap: 5px; align-items: center;">
        <span>AIASG/2026/</span>
        <input type="number" id="mem_id_num" placeholder="001" style="flex:1">
    </div>
    <input type="number" id="mem_mobile" placeholder="മൊബൈൽ നമ്പർ">
    <button class="btn btn-p" onclick="loginMember()">Login</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<div class="box hidden" id="visitorForm">
    <h3>Visitors Entry</h3>
    <input type="text" id="v_name" placeholder="പേര്">
    <input type="number" id="v_mobile" placeholder="മൊബൈൽ">
    <button class="btn btn-s" onclick="show('visitorDash')">Next</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<div class="box hidden" id="visitorDash">
    <h3>Association Goals</h3>
    <div class="card"><p>സുരക്ഷാ ജീവനക്കാരുടെ ക്ഷേമത്തിനായി ഒന്നിക്കുന്നു.</p></div>
    <button class="btn btn-d" onclick="show('payPage')">മെമ്പർഷിപ്പ് എടുക്കൂ</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('AIASG_SECURE_V11')) || {
        members: { '001': { id: 'AIASG/2026/001', name: 'Bharath', mobile: '9446841656' } },
        comps: []
    };
    let curUser = null;

    function show(id) { 
        document.querySelectorAll('.box').forEach(b => b.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    }

    function makeCall(num) { window.open('tel:' + num, '_system'); }

    function loginMember() {
        let n = document.getElementById('mem_id_num').value.padStart(3, '0');
        let m = document.getElementById('mem_mobile').value.trim();
        if(db.members[n] && db.members[n].mobile === m) {
            curUser = db.members[n];
            document.getElementById('welcomeMsg').innerText = "Welcome " + curUser.name;
            show('memberDash');
        } else alert("തെറ്റായ വിവരങ്ങൾ!");
    }

    function submitComp() {
        db.comps.push({ name: curUser.name, msg: document.getElementById('comp_text').value, status: 'Pending' });
        save(); 
        alert("നിങ്ങളുടെ പരാതി ലഭിച്ചിട്ടുണ്ട്. ഞങ്ങളുടെ പ്രതിനിധി ഉടനെ താങ്കളെ കോണ്ടാക്റ്റ് ചെയ്യുന്നതായിരിക്കും."); 
        show('homePage');
    }

    function adminAuth() {
        if(document.getElementById('admin_pass').value === "0000") { renderAdmin(); show('adminDash'); }
        else alert("Wrong Password!");
    }

    function addMember() {
        let name = document.getElementById('new_name').value;
        let id = document.getElementById('new_id').value.padStart(3, '0');
        let mob = document.getElementById('new_mobile').value;
        if(name && id && mob) {
            db.members[id] = { id: 'AIASG/2026/'+id, name: name, mobile: mob };
            save(); renderAdmin(); alert("മെമ്പറെ ചേർത്തു!");
        }
    }

    function solveComp(i) {
        alert("പരാതി പരിഹരിച്ചു. മെമ്പറെ വിവരമറിയിച്ചു.");
        db.comps.splice(i, 1);
        save(); renderAdmin();
    }

    function deleteComp(i) {
        if(confirm("ഈ പരാതി ഡിലീറ്റ് ചെയ്യണോ?")) {
            db.comps.splice(i, 1);
            save(); renderAdmin();
        }
    }

    function renderAdmin() {
        let h = "<b>പരാതികൾ:</b>";
        db.comps.forEach((c, i) => {
            h += `<div class='card'><b>${c.name}:</b> ${c.msg} 
            <br><button class='btn-sm btn-s' onclick="solveComp(${i})">Solve & Notify</button>
            <button class='btn-sm btn-d' onclick="deleteComp(${i})">Delete</button></div>`;
        });
        document.getElementById('admin_content').innerHTML = h;
    }

    function save() { localStorage.setItem('AIASG_SECURE_V11', JSON.stringify(db)); }
</script>
</body>
</html>
