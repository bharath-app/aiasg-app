<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIASGTWF Association</title>
    <style>
        :root { --p: #1a237e; --s: #28a745; --d: #dc3545; --accent: #ffd700; --b: #6c757d; }
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #f4f7f6; color: #333; text-align: center; }
        .box { background: white; max-width: 450px; margin: 20px auto; padding: 25px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border-top: 5px solid var(--accent); position: relative; }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 16px; margin-top: 10px; transition: 0.3s; display: block; text-decoration: none; }
        .btn-p { background: var(--p); } .btn-s { background: var(--s); } .btn-d { background: var(--d); } .btn-b { background: var(--b); }
        .btn-sm { padding: 5px 10px; font-size: 12px; width: auto; display: inline-block; margin: 5px; }
        .hidden { display: none; }
        .card { background: #f9f9f9; padding: 15px; margin: 10px 0; border-radius: 10px; text-align: left; border-left: 4px solid var(--p); position: relative; }
        .solved-card { border-left: 4px solid var(--s); background: #e8f5e9; }
        .notif-badge { background: #fff9c4; color: #333; padding: 12px; border-radius: 10px; margin-bottom: 15px; border: 1px solid #fbc02d; text-align: left; }
        .logo-main { width: 110px; height: auto; margin-bottom: 15px; display: block; margin-left: auto; margin-right: auto; }
        .secret-head { cursor: pointer; user-select: none; } /* രഹസ്യ ലോഗിനായി */
    </style>
</head>
<body>

<div class="box" id="homePage">
    <img src="logo.png" alt="Logo" class="logo-main" onerror="this.src='https://via.placeholder.com/120?text=AIASG'">
    <h3 style="color: var(--p); margin: 0;">AIASGTWF ASSOCIATION</h3>
    <p style="font-weight: bold; color: var(--accent); margin: 5px 0;">"UNITY IS STRENGTH"</p>
    <hr>
    <button class="btn btn-p" onclick="show('memberLogin')">Member Login</button>
    <button class="btn btn-s" onclick="show('regForm')">Join Association (₹200)</button>
</div>

<div class="box hidden" id="regForm">
    <h3>New Membership</h3>
    <p style="font-size: 13px; color: #666;">ദയവായി താഴെ പറയുന്ന വിവരങ്ങൾ പൂരിപ്പിക്കുക</p>
    <input type="text" id="reg_name" placeholder="പേര്">
    <input type="text" id="reg_place" placeholder="സ്ഥലം">
    <input type="number" id="reg_mobile" placeholder="മൊബൈൽ നമ്പർ">
    <input type="text" id="reg_agency" placeholder="ഏജൻസിയുടെ പേര്">
    <input type="number" id="reg_salary" placeholder="ലഭിക്കുന്ന സാലറി">
    <select id="reg_esipf"><option value="">ESI/PF ഉണ്ടോ?</option><option value="Yes">ഉണ്ട്</option><option value="No">ഇല്ല</option></select>
    <button class="btn btn-s" onclick="processPayment()">Pay ₹200 & Join</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<div class="box hidden" id="memberLogin">
    <h3 class="secret-head" onclick="checkSecret()">Member Login</h3>
    <div style="display: flex; gap: 5px; align-items: center;">
        <span>AIASG/2026/</span>
        <input type="number" id="mem_id_num" placeholder="001" style="flex:1">
    </div>
    <input type="number" id="mem_mobile_login" placeholder="മൊബൈൽ നമ്പർ">
    <button class="btn btn-p" onclick="loginMember()">Login</button>
    <button class="btn btn-b" onclick="show('homePage')">Back</button>
</div>

<div class="box hidden" id="adminLogin">
    <h3>Creator Login</h3>
    <input type="password" id="admin_pass" placeholder="Password (0000)">
    <button class="btn btn-p" onclick="adminAuth()">Login</button>
    <button class="btn btn-b" onclick="show('memberLogin')">Cancel</button>
</div>

<div class="box hidden" id="adminDash">
    <img src="logo.png" alt="Logo" class="logo-main" style="width: 100px;">
    <h3 class="secret-head">AIASG ASSOCIATION</h3>
    
    <div style="display: flex; justify-content: center; margin-top: 15px;">
        <div style="text-align: left; padding-right: 20px;">
            <p style="color:red; font-weight:bold;">SOS</p>
            <p>അപേക്ഷകൾ:</p>
            <p>പുതിയ പരാതികൾ:</p>
        </div>
        <div>
            <button style="background: red; color:white; font-size:30px; border-radius:15px; border:none; padding:15px; cursor:pointer;" onclick="window.location.href='tel:112'">SOS</button>
        </div>
    </div>
    <hr>
    
    <h4>Complaints History</h4>
    <div id="admin_content" style="text-align: left; margin-top: 15px;"></div>
    
    <button class="btn btn-b" onclick="show('homePage')">Logout</button>
</div>

<div class="box hidden" id="memberDash">
    <h3 id="welcomeMsg" style="color: var(--s);">Welcome</h3>
    <div id="memberNotif" class="hidden"></div>
    
    <div class="card">
        <h4>അടിയന്തര സാഹചര്യം</h4>
        <button class="btn btn-d" onclick="window.location.href='tel:9446841656'">അസോസിയേഷനെ അറിയിക്കുക</button>
    </div>

    <div class="card">
        <h4>പരാതി സമർപ്പിക്കാൻ</h4>
        <textarea id="comp_text" placeholder="പരാതി ഇവിടെ എഴുതുക..." rows="4"></textarea>
        <button class="btn btn-p" onclick="submitComp()">Submit Complaint</button>
    </div>
    <button class="btn btn-b" onclick="show('homePage')">Logout</button>
</div>

<script>
    let db = JSON.parse(localStorage.getItem('AIASG_FINAL_V15')) || {
        pending_approvals: [],
        members: { '001': { id: 'AIASG/2026/001', name: 'Bharath', mobile: '9446841656' } }, // ഡെമോ മെമ്പർ
        comps: [],
        solved_comps: [],
        notifications: {}
    };
    let curUser = null;
    let clickCount = 0;

    function show(id) { 
        document.querySelectorAll('.box').forEach(b => b.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    }

    function save() { localStorage.setItem('AIASG_FINAL_V15', JSON.stringify(db)); }

    // രഹസ്യ ലോഗിൻ പരിശോധന
    function checkSecret() {
        clickCount++;
        if(clickCount >= 5) { show('adminLogin'); clickCount = 0; }
        setTimeout(() => clickCount = 0, 3000); // 3 സെക്കന്റിന് ശേഷം റീസെറ്റ് ചെയ്യും
    }

    function processPayment() {
        let data = { name: document.getElementById('reg_name').value, mobile: document.getElementById('reg_mobile').value, agency: document.getElementById('reg_agency').value, date: new Date().toLocaleDateString() };
        if(data.name && data.mobile && data.agency) {
            db.pending_approvals.push(data); save();
            window.location.href = `upi://pay?pa=bharath199389@oksbi&pn=Bharath&am=200&cu=INR&tn=Membership_${data.mobile}`;
            alert("വിവരങ്ങൾ രേഖപ്പെടുത്തി. GPay പൂർത്തിയാക്കി തിരികെ വരിക."); show('homePage');
        } else alert("ദയവായി പേരും മൊബൈൽ നമ്പറും ഏജൻസിയും പൂരിപ്പിക്കുക.");
    }

    function loginMember() {
        let n = document.getElementById('mem_id_num').value.padStart(3, '0');
        let m = document.getElementById('mem_mobile_login').value.trim();
        if(db.members[n] && db.members[n].mobile === m) {
            curUser = db.members[n];
            document.getElementById('welcomeMsg').innerText = "Welcome " + curUser.name;
            checkNotifications(m); show('memberDash');
