<!DOCTYPE html>
<html lang="ml">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AIASGTWF Welfare Foundation</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        :root { --primary: #1a237e; --secondary: #2e7d32; --accent: #ffd700; --danger: #d32f2f; --bg: #f4f7f9; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Poppins', sans-serif; margin: 0; background: var(--bg); padding-bottom: 80px; }
        
        /* Premium Header */
        header { background: var(--primary); color: white; padding: 15px; text-align: center; border-radius: 0 0 25px 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 1001; }
        .logo-img { width: 50px; height: 50px; background: white; border-radius: 50%; padding: 3px; border: 2px solid var(--accent); cursor: pointer; }
        .back-btn { color: white; font-size: 20px; cursor: pointer; padding: 5px 15px; visibility: hidden; }
        .back-btn.show { visibility: visible; }
        
        .container { max-width: 500px; margin: auto; padding: 15px; }
        .card { background: white; border-radius: 20px; padding: 20px; margin-bottom: 15px; box-shadow: 0 8px 20px rgba(0,0,0,0.06); }
        
        /* Inputs & Buttons */
        input, select, textarea { width: 100%; padding: 14px; margin: 10px 0; border: 1px solid #ddd; border-radius: 12px; font-size: 14px; }
        .btn { width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; transition: 0.3s; }
        .btn-p { background: var(--primary); color: white; }
        .btn-s { background: var(--secondary); color: white; }
        .btn-d { background: var(--danger); color: white; }

        /* ID Card */
        .id-card-modern { background: linear-gradient(135deg, #1a237e 0%, #283593 100%); color: white; border-radius: 20px; padding: 25px; border: 2px solid var(--accent); }
        
        /* Bottom Nav */
        .nav-bar { position: fixed; bottom: 0; left: 0; right: 0; background: white; display: flex; padding: 12px; border-top: 1px solid #eee; z-index: 1000; }
        .nav-item { text-align: center; color: #888; font-size: 11px; flex: 1; cursor: pointer; }
        .nav-item.active { color: var(--primary); font-weight: bold; }

        /* Creator Room Styles */
        .admin-tab-btn { flex: 1; padding: 10px; border: none; background: #eee; cursor: pointer; font-size: 12px; font-weight: 600; }
        .admin-tab-btn.active { background: var(--primary); color: white; }
        .member-info-card { border-bottom: 1px solid #eee; padding: 10px 0; font-size: 13px; }
        .status-tag { padding: 2px 8px; border-radius: 4px; font-size: 10px; color: white; }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

<header>
    <div id="headerBack" class="back-btn" onclick="goBack()"><i class="fas fa-arrow-left"></i></div>
    <img src="logo.png" class="logo-img" onclick="adminTrigger()" onerror="this.src='https://via.placeholder.com/50?text=AIASG'">
    <div style="width:50px;"></div>
</header>

<div class="container">
    
    <div id="home" class="page active">
        <div class="card" style="text-align:center;">
            <h3>നമസ്കാരം ഭാരത് എ</h3>
            <button class="btn btn-p" onclick="showPage('login')">മെമ്പർ ലോഗിൻ</button>
            <button class="btn btn-s" style="margin-top:12px;" onclick="showPage('register')">പുതിയ രജിസ്ട്രേഷൻ</button>
        </div>
        <button class="btn btn-d" onclick="window.location.href='tel:9446841656'">SOS EMERGENCY</button>
    </div>

    <div id="register" class="page">
        <div class="card">
            <h3>അംഗമാകുക</h3>
            <input type="text" id="r_name" placeholder="മുഴുവൻ പേര്">
            <input type="number" id="r_mob" placeholder="മൊബൈൽ നമ്പർ">
            <input type="text" id="r_place" placeholder="സ്ഥലം">
            <input type="text" id="r_agency" placeholder="ഏജൻസി">
            <input type="number" id="r_sal" placeholder="ശമ്പളം">
            <select id="r_pf">
                <option value="No">PF/ESI ഇല്ല</option>
                <option value="Yes">PF/ESI ഉണ്ട്</option>
            </select>
            <div style="text-align:center; padding:15px; background:#f9f9f9; border-radius:15px; border:1px dashed #ccc;">
                <p style="font-size:12px;">Scan & Pay ₹200</p>
                <img src="https://via.placeholder.com/150?text=QR+Scanner" style="width:120px; margin-bottom:10px;">
                <button class="btn btn-p" style="background:#000;" onclick="document.getElementById('payConfirm').style.display='block'">GPay പണമടച്ചു</button>
            </div>
            <div id="payConfirm" style="display:none; margin-top:15px;">
                <button class="btn btn-s" onclick="submitReg()">രജിസ്ട്രേഷൻ പൂർത്തിയാക്കുക</button>
            </div>
        </div>
    </div>

    <div id="dashboard" class="page">
        <div class="id-card-modern">
            <h2 id="m_name">NAME</h2>
            <p id="m_id" style="color:var(--accent); font-weight:bold;">AIASG/2026/001</p>
            <div style="font-size:13px; margin-top:10px;">
                <i class="fas fa-building"></i> <span id="m_agency">Agency</span><br>
                <i class="fas fa-map-marker-alt"></i> <span id="m_place">Location</span>
            </div>
        </div>
        <div id="solveNotice" class="card" style="display:none; border-left:5px solid var(--secondary); margin-top:15px;">
            <p style="font-size:11px; color:var(--secondary); font-weight:bold;">അഡ്മിൻ മറുപടി:</p>
            <p id="adminReply" style="font-size:13px; margin:0;"></p>
        </div>
        <div class="card" style="margin-top:15px;">
            <h4>Wage Tracker</h4>
            <input type="number" id="w_days" placeholder="ജോലി ചെയ്ത ദിവസങ്ങൾ" oninput="calcWage()">
            <div id="w_res" style="color:var(--secondary); font-weight:bold;"></div>
        </div>
    </div>

    <div id="reportPage" class="page">
        <div class="card">
            <h3>പരാതി നൽകുക</h3>
            <textarea id="comp_text" rows="5" placeholder="പരാതി വിശദമായി എഴുതുക..."></textarea>
            <button class="btn btn-p" onclick="submitComplaint()">അയക്കുക</button>
        </div>
    </div>

    <div id="creatorDash" class="page">
        <h3 style="margin-bottom:10px;">ക്രിയേറ്റർ റൂം</h3>
        <div style="display:flex; border-radius:10px; overflow:hidden; margin-bottom:15px;">
            <button class="admin-tab-btn active" id="tab1" onclick="switchAdminTab(1)">മെമ്പർഷിപ്പ് ലിസ്റ്റ്</button>
            <button class="admin-tab-btn" id="tab2" onclick="switchAdminTab(2)">പരാതികൾ</button>
        </div>

        <div id="adminContent1">
            <div class="card">
                <h5>ആകെ മെമ്പർമാർ: <span id="memCount">2</span></h5>
                <div id="fullMemberList">
                    <div class="member-info-card">
                        <b>ഭാരത് എ (9446841656)</b><br>
                        <small>സ്ഥലം: Palakkad | ഏജൻസി: Safeguard</small><br>
                        <small>ശമ്പളം: 18000 | PF: Yes | <span class="status-tag" style="background:var(--secondary)">Active</span></small>
                    </div>
                </div>
            </div>
        </div>

        <div id="adminContent2" style="display:none;">
            <div class="card">
                <h5 style="color:var(--danger)">പുതിയ പരാതികൾ</h5>
                <div id="adminGrievanceList"></div>
            </div>
        </div>
    </div>

    <div id="login" class="page">
        <div class="card">
            <h3>Login</h3>
            <input type="number" id="l_mob" placeholder="മൊബൈൽ നമ്പർ">
            <button class="btn btn-p" onclick="handleLogin()">Login</button>
        </div>
    </div>

</div>

<div class="nav-bar" id="mainNav" style="display:none;">
    <div class="nav-item active" id="navHome" onclick="showPage('dashboard')"><i class="fas fa-id-card"></i><br>Home</div>
    <div class="nav-item" id="navReport" onclick="showPage('reportPage')"><i class="fas fa-edit"></i><br>Report</div>
</div>

<script>
    let historyStack = ['home'];
    let clickCount = 0;

    // മോക്ക് ഡാറ്റ (യഥാർത്ഥത്തിൽ ഇത് ഷീറ്റിൽ നിന്ന് വരും)
    let members = [
        {name: "Bharath A", mob: "9446841656", place: "Palakkad", agency: "Safeguard Services", sal: "18000", pf: "Yes"}
    ];
    let grievances = [
        {id: 101, name: "Suresh", mob: "9900887766", msg: "Salary delay of 10 days", status: "Pending"}
    ];

    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        document.getElementById('headerBack').classList.toggle('show', id !== 'home');
        if(id !== historyStack[historyStack.length-1]) historyStack.push(id);
        document.getElementById('mainNav').style.display = (id === 'dashboard' || id === 'reportPage') ? 'flex' : 'none';
    }

    function goBack() {
        if(historyStack.length > 1) { historyStack.pop(); showPage(historyStack[historyStack.length-1]); }
    }

    function switchAdminTab(n) {
        document.getElementById('adminContent1').style.display = (n===1) ? 'block' : 'none';
        document.getElementById('adminContent2').style.display = (n===2) ? 'block' : 'none';
        document.querySelectorAll('.admin-tab-btn').forEach((b, i) => b.classList.toggle('active', i+1 === n));
    }

    function adminTrigger() {
        clickCount++;
        if(clickCount >= 5) {
            let p = prompt("Password:");
            if(p === "1993") { 
                showPage('creatorDash'); 
                renderAdminData(); 
            }
            clickCount = 0;
        }
        setTimeout(() => clickCount = 0, 3000);
    }

    function renderAdminData() {
        // മെമ്പർ ലിസ്റ്റ് കാണിക്കാൻ
        const mList = document.getElementById('fullMemberList');
        mList.innerHTML = members.map(m => `
            <div class="member-info-card">
                <b>${m.name} (${m.mob})</b><br>
                <small>സ്ഥലം: ${m.place} | ഏജൻസി: ${m.agency}</small><br>
                <small>ശമ്പളം: ${m.sal} | PF: ${m.pf} | <span class="status-tag" style="background:var(--secondary)">Verified</span></small>
            </div>
        `).join('');

        // പരാതി ലിസ്റ്റ് കാണിക്കാൻ
        const gList = document.getElementById('adminGrievanceList');
        gList.innerHTML = grievances.map(g => `
            <div class="member-info-card" style="border-left:4px solid var(--danger); padding-left:10px;">
                <b>${g.name} (${g.mob})</b>
                <p style="margin:5px 0;">${g.msg}</p>
                <div style="display:flex; gap:5px;">
                    <input type="text" id="rep_${g.id}" placeholder="മറുപടി..." style="padding:5px; margin:0;">
                    <button class="btn btn-s" style="padding:5px 10px; width:auto;" onclick="alert('Solved')">Solve</button>
                </div>
            </div>
        `).join('');
    }

    function submitReg() {
        const newMem = {
            name: document.getElementById('r_name').value,
            mob: document.getElementById('r_mob').value,
            place: document.getElementById('r_place').value,
            agency: document.getElementById('r_agency').value,
            sal: document.getElementById('r_sal').value,
            pf: document.getElementById('r_pf').value
        };
        members.push(newMem);
        alert("വിവരങ്ങൾ അഡ്മിന് ലഭിച്ചു. ഉടൻ ഐഡി ലഭിക്കുന്നതാണ്.");
        showPage('home');
    }

    function handleLogin() {
        if(document.getElementById('l_mob').value === "9446841656") {
            document.getElementById('m_name').innerText = "Bharath A";
            document.getElementById('m_place').innerText = "Palakkad";
            document.getElementById('m_agency').innerText = "Safeguard Services";
            showPage('dashboard');
        }
    }

    function calcWage() { 
        let d = document.getElementById('w_days').value;
        if(d) document.getElementById('w_res').innerText = "₹" + (d * 675);
    }

    function submitComplaint() { alert("പരാതി ലഭിച്ചു!"); showPage('dashboard'); }
</script>
</body>
  </html>
